<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ana_log</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <button class="top-btn" id="close-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M14 4L4 14M4 4L14 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <h1 class="app-title">ana_log</h1>
      <button class="top-btn" id="menu-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="4" cy="9" r="1.5" fill="currentColor"/>
          <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
          <circle cx="14" cy="9" r="1.5" fill="currentColor"/>
        </svg>
      </button>
    </header>
    <div class="card-viewport" id="card-viewport">
      <div class="card-track" id="card-track"></div>
    </div>
    <div class="photo-viewer" id="photo-viewer">
      <div class="photo-viewer-card" id="photo-viewer-card">
        <div class="photo-viewer-img-wrap" id="photo-viewer-img-wrap">
          <img id="photo-viewer-img" src="" alt="">
        </div>
      </div>
    </div>
  </div>
  <script src="data.js"></script>
  <script src="gestures.js"></script>
  <script src="app.js"></script>
</body>
</html>
